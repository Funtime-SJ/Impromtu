<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Item</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;max-width:720px;margin:40px auto;padding:0 16px}
    form{display:grid;gap:12px}
    label{font-weight:600}
    input[type="text"],input[type="number"],textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
    button{padding:10px 14px;border:none;background:initial;color:initial;border-radius:4px;cursor:pointer}
    .row{display:flex;gap:8px}
  </style>
  <script src="itemcreation.js"></script>
</head>
<body>
  <h1>Create New Item</h1>
  <form id="itemForm" enctype="multipart/form-data" autocomplete="off">
    <div>
      <label for="title">Title</label>
      <input id="title" name="title" type="text" required />
    </div>
    <div>
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"></textarea>
    </div>
    <div class="row">
      <div style="flex:1">
        <label for="price">Price</label>
        <input id="price" name="price" type="number" step="0.01" min="0" />
      </div>
      <div style="flex:1">
        <label for="quantity">Quantity</label>
        <input id="quantity" name="quantity" type="number" min="0" value="1" />
      </div>
    </div>
    <div>
      <label for="image">Image</label>
      <input id="image" name="image" type="file" accept="image/*" />
    </div>
    <div>
      <button type="submit">Create Item</button>
    </div>
    <div id="message" aria-live="polite"></div>
  </form>

  
</body>
</html>
